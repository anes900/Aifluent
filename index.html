    <div onClick={onOpen} style={{

// -- QUIZ SCREEN -----------------------------------------------------------
function QuizScreen({ course, onPass, onFail }) {
  const questions = COURSE_QUIZZES[course?.id] || COURSE_QUIZZES[1];
  const PASS_SCORE = 4; // 4/5 needed
  const [step, setStep]       = useState("intro");
  const [current, setCurrent] = useState(0);
  const [answers, setAnswers] = useState(Array(questions.length).fill(null));
  const [selected, setSelected] = useState(null);
  const [revealed, setRevealed] = useState(false);

  const q = questions[current];
  const score = answers.filter((a, i) => a === questions[i].correct).length;
  const passed = score >= PASS_SCORE;

  function choose(idx) {
    if (revealed) return;
    setSelected(idx);
    setRevealed(true);
    const updated = [...answers];
    updated[current] = idx;
    setAnswers(updated);
  }

  function next() {
    if (current < questions.length - 1) {
      setCurrent(c => c + 1);
      setSelected(null);
      setRevealed(false);
    } else {
      setStep("result");
    }
  }

  function retry() {
    setCurrent(0);
    setAnswers(Array(questions.length).fill(null));
    setSelected(null);
    setRevealed(false);
    setStep("intro");
    onFail();
  }

  // -- INTRO --
  if (step === "intro") return (
    <div style={{ minHeight: "100vh", background: T.bg, display: "flex", flexDirection: "column", padding: "60px 20px 40px" }}>
      <div style={{ textAlign: "center", marginBottom: 32 }}>
        <div style={{ fontSize: "3.5rem", marginBottom: 12 }}>📝</div>
        <div style={{ fontFamily: F.display, fontSize: "2rem", color: T.white, lineHeight: 1.1, marginBottom: 8 }}>
          ZAVRŠNI <span style={{ color: course?.color || T.gold }}>KVIZ</span>
        </div>
        <div style={{ fontFamily: F.mono, fontSize: "0.65rem", color: T.muted, letterSpacing: 2, textTransform: "uppercase" }}>
          {course?.title}
        </div>
      </div>

      <div style={{ background: T.card, borderRadius: 18, padding: "22px 20px", marginBottom: 16 }}>
        <div style={{ fontFamily: F.mono, fontSize: "0.6rem", color: T.gold, letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 14 }}>Pravila kviza</div>
        {[
          ["📋", `${questions.length} pitanja iz gradiva kursa`],
          ["✅", `Potrebno ${PASS_SCORE}/${questions.length} tačnih odgovora`],
          ["🎓", "Položen kviz → sertifikat i pokloni"],
          ["🔄", "Pao kviz → ponavljaš program i polaže ponovo"],
        ].map(([ic, tx]) => (
          <div key={tx} style={{ display: "flex", gap: 12, alignItems: "center", marginBottom: 10 }}>
            <span style={{ fontSize: "1.1rem", flexShrink: 0 }}>{ic}</span>
            <span style={{ fontSize: "0.84rem", color: "#9ca3af", lineHeight: 1.4 }}>{tx}</span>
          </div>
        ))}
      </div>

      <div style={{ background: `${T.gold}10`, border: `1px solid ${T.border}`, borderRadius: 14, padding: "14px 16px", marginBottom: 28 }}>
        <div style={{ fontSize: "0.82rem", color: "#9ca3af", lineHeight: 1.65 }}>
          💡 <strong style={{ color: T.gold }}>Savet:</strong> Sve odgovore smo obradili u lekcijama. Ako nisi siguran/na, ponovi modul koji ti je bio najteži.
        </div>
      </div>

      <button onClick={() => setStep("quiz")} style={{ ...btn(), background: course?.color || T.gold, color: "#000", padding: 18, borderRadius: 16, fontSize: "1rem", fontFamily: F.body }}>
        Kreni sa kvizom →
      </button>
    </div>
  );

  // -- RESULT --
  if (step === "result") return (
    <div style={{ minHeight: "100vh", background: T.bg, padding: "60px 20px 40px" }}>
      <div style={{ textAlign: "center", marginBottom: 28 }}>
        <div style={{ fontSize: "4rem", marginBottom: 10 }}>{passed ? "🎉" : "📚"}</div>
        <div style={{ fontFamily: F.display, fontSize: "2.2rem", color: passed ? T.green : T.red, lineHeight: 1, marginBottom: 6 }}>
          {passed ? "POLOŽIO/LA SI!" : "NIJE PROŠLO"}
        </div>
        <div style={{ fontFamily: F.display, fontSize: "1.1rem", color: T.white, marginBottom: 4 }}>
          {score}/{questions.length} tačnih odgovora
        </div>
        <div style={{ fontFamily: F.mono, fontSize: "0.62rem", color: T.muted }}>
          {passed ? `Bravo! Savladao/la si ${course?.title}.` : `Potrebno ${PASS_SCORE} — ponoviti gradivo.`}
        </div>
      </div>

      {/* Score bar */}
      <div style={{ background: T.card, borderRadius: 14, padding: "18px 16px", marginBottom: 16 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
          <span style={{ fontFamily: F.mono, fontSize: "0.6rem", color: T.muted, textTransform: "uppercase", letterSpacing: 1 }}>Rezultat</span>
          <span style={{ fontFamily: F.display, fontSize: "1.4rem", color: passed ? T.green : T.red }}>{Math.round(score/questions.length*100)}%</span>
        </div>
        <div style={{ background: "rgba(255,255,255,0.06)", borderRadius: 6, height: 8, overflow: "hidden" }}>
          <div style={{ height: "100%", borderRadius: 6, background: passed ? T.green : T.red, width: `${score/questions.length*100}%`, transition: "width 1s ease" }} />
        </div>
      </div>

      {/* Per-question review */}
      <div style={{ background: T.card, borderRadius: 14, overflow: "hidden", marginBottom: 20 }}>
        <div style={{ padding: "12px 16px", borderBottom: "1px solid rgba(255,255,255,0.05)", fontFamily: F.mono, fontSize: "0.58rem", color: T.muted, letterSpacing: 1, textTransform: "uppercase" }}>Pregled odgovora</div>
        {questions.map((qq, i) => {
          const isCorrect = answers[i] === qq.correct;
          return (
            <div key={i} style={{ padding: "12px 16px", borderBottom: i < questions.length - 1 ? "1px solid rgba(255,255,255,0.04)" : "none", display: "flex", gap: 10, alignItems: "flex-start" }}>
              <div style={{ width: 24, height: 24, borderRadius: "50%", background: isCorrect ? T.green : T.red, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "0.7rem", color: "#000", flexShrink: 0, fontWeight: 800 }}>
                {isCorrect ? "✓" : "✗"}
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: "0.78rem", color: T.white, lineHeight: 1.4, marginBottom: 3 }}>{qq.q}</div>
                {!isCorrect && (
                  <div style={{ fontSize: "0.72rem", color: T.green, lineHeight: 1.4 }}>
                    ✓ Tačno: {qq.options[qq.correct]}
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>

      {passed ? (
        <button onClick={onPass} style={{ ...btn(), background: T.green, color: "#000", padding: 18, borderRadius: 16, fontSize: "1rem", fontFamily: F.body, width: "100%" }}>
          🎁 Preuzmi poklone →
        </button>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          <div style={{ background: `${T.red}10`, border: `1px solid ${T.red}33`, borderRadius: 14, padding: "16px", marginBottom: 4 }}>
            <div style={{ fontWeight: 700, fontSize: "0.88rem", color: T.red, marginBottom: 6 }}>Potrebno ponavljanje</div>
            <div style={{ fontSize: "0.8rem", color: "#9ca3af", lineHeight: 1.6 }}>
              Savladaš li gradivo temeljno, kviz ćeš sledeći put lako proći. Preporučujemo da ponovo prođeš module gde si pogrešio/la.
            </div>
          </div>
          <button onClick={retry} style={{ ...btn(), background: course?.color || T.gold, color: "#000", padding: 16, borderRadius: 14, fontSize: "0.95rem", fontFamily: F.body }}>
            🔄 Ponovi program i pokušaj ponovo
          </button>
        </div>
      )}
    </div>
  );

  // -- QUESTION --
  const progress = (current / questions.length) * 100;
  return (
    <div style={{ minHeight: "100vh", background: T.bg, padding: "52px 20px 40px" }}>
      {/* Progress */}
      <div style={{ marginBottom: 20 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
          <div style={{ fontFamily: F.mono, fontSize: "0.6rem", color: T.muted }}>
            Pitanje {current + 1} od {questions.length}
          </div>
          <div style={{ fontFamily: F.mono, fontSize: "0.6rem", color: course?.color || T.gold }}>
            {current}/{questions.length} završeno
          </div>
        </div>
        <div style={{ background: "rgba(255,255,255,0.06)", borderRadius: 6, height: 5, overflow: "hidden" }}>
          <div style={{ height: "100%", borderRadius: 6, background: course?.color || T.gold, width: `${progress}%`, transition: "width 0.4s ease" }} />
        </div>
      </div>

      {/* Question */}
      <div style={{ background: T.card, borderRadius: 18, padding: "22px 18px", marginBottom: 16 }}>
        <div style={{ fontFamily: F.mono, fontSize: "0.58rem", color: course?.color || T.gold, letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 12 }}>
          {course?.title} · Kviz
        </div>
        <div style={{ fontSize: "1rem", fontWeight: 700, color: T.white, lineHeight: 1.55 }}>{q.q}</div>
      </div>

      {/* Options */}
      <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 20 }}>
        {q.options.map((opt, i) => {
          const isCorrect = i === q.correct;
          const isChosen  = i === selected;
          let bg    = "rgba(255,255,255,0.04)";
          let border = "rgba(255,255,255,0.08)";
          let color  = T.white;
          if (revealed) {
            if (isCorrect)            { bg = `${T.green}18`; border = T.green + "66"; color = T.green; }
            else if (isChosen)        { bg = `${T.red}12`;   border = T.red   + "55"; color = T.red;   }
          } else if (isChosen) {
            bg = `${course?.color || T.gold}15`; border = (course?.color || T.gold) + "55"; color = course?.color || T.gold;
          }
          return (
            <button key={i} onClick={() => choose(i)} disabled={revealed} style={{
              ...btn(), background: bg, border: `1px solid ${border}`, borderRadius: 14,
              padding: "16px 18px", textAlign: "left", color, fontSize: "0.88rem", lineHeight: 1.45,
              display: "flex", gap: 12, alignItems: "center", transition: "all 0.25s",
            }}>
              <div style={{ width: 28, height: 28, borderRadius: "50%", background: revealed && isCorrect ? T.green : revealed && isChosen ? T.red : "rgba(255,255,255,0.07)", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: F.mono, fontSize: "0.7rem", flexShrink: 0, transition: "all 0.25s", color: revealed ? "#000" : T.muted, fontWeight: 800 }}>
                {revealed && isCorrect ? "✓" : revealed && isChosen ? "✗" : ["A","B","C","D"][i]}
              </div>
              <span style={{ flex: 1 }}>{opt}</span>
            </button>
          );
        })}
      </div>

      {/* Feedback + Next */}
      {revealed && (
        <div style={{ animation: "fadeSlideIn 0.3s ease" }}>
          <div style={{ background: selected === q.correct ? `${T.green}10` : `${T.red}10`, border: `1px solid ${selected === q.correct ? T.green : T.red}33`, borderRadius: 12, padding: "14px 16px", marginBottom: 14 }}>
            <div style={{ fontWeight: 700, fontSize: "0.85rem", color: selected === q.correct ? T.green : T.red, marginBottom: 4 }}>
              {selected === q.correct ? "✓ Tačno!" : "✗ Netačno"}
            </div>
            {selected !== q.correct && (
              <div style={{ fontSize: "0.8rem", color: "#9ca3af", lineHeight: 1.5 }}>
                Tačan odgovor: <strong style={{ color: T.green }}>{q.options[q.correct]}</strong>
              </div>
            )}
          </div>
          <button onClick={next} style={{ ...btn(), background: course?.color || T.gold, color: "#000", padding: 16, borderRadius: 14, fontSize: "0.95rem", fontFamily: F.body, width: "100%" }}>
            {current < questions.length - 1 ? "Sledeće pitanje →" : "Vidi rezultat →"}
          </button>
        </div>
      )}
    </div>
  );
}

// -- FILTER ENGINE ---------------------------------------------------------
const FILTER_RULES = {
  competitors: ["udemy", "coursera", "skillshare", "masterclass", "linkedin learning", "domestika", "edx", "pluralsight"],
  negative:    ["prevara", "lažno", "beskorisno", "gluposti", "gubljenje", "bezveze", "ne vredi", "loše", "katastrofa", "scam", "rip off", "smeće", "laž", "prevarili", "žalim", "lose", "uzasno", "užasno", "krađa"],
  spam:        ["klikni ovde", "zarada od kuće", "brza zarada", "zaradite", "telegram kanal", "whatsapp grupa", "pridruži se mom", "popust kod", "promo kod", "t.me/", "bit.ly", "tinyurl", "http://", "www."],
  toxic:       ["glupan", "idiot", "budala", "tupan", "debil", "smešno što", "sramota", "glupost", "smece", "smeće"],
};


function filterPost(text){
  const lower = text.toLowerCase();
  // Competitor mentions — dozvoli ako su u pozitivnom kontekstu ("bolje od", "za razliku od", "pre sam koristio")
  const positiveContext = ["bolje", "za razliku", "pre sam", "mnogo bolje", "preferiram", "prebacio", "preporučujem umesto"];
  const hasPositiveContext = positiveContext.some(w => lower.includes(w));
  if (!hasPositiveContext) {
    for (const w of FILTER_RULES.competitors)
      if (lower.includes(w)) return { ok: false, severity: "block", category: "Konkurencija",
        reason: `Spominjanje "${w}" nije dozvoljeno.`, suggestion: "Fokusiraj se na AI Fluent sadržaj i svoja iskustva." };
  }
  for (const w of FILTER_RULES.negative)
    if (lower.includes(w)) return { ok: false, severity: "block", category: "Negativan sadržaj",
      reason: "Komentar krši pravila zajednice.", suggestion: "Ako imaš problem sa platformom, kontaktiraj podršku direktno." };
  for (const w of FILTER_RULES.toxic)
    if (lower.includes(w)) return { ok: false, severity: "block", category: "Neprikladan ton",
      reason: "Ovakav ton nije dozvoljen u zajednici.", suggestion: "Zajednica je prostor za podršku — preformuliši ljubaznije." };
  for (const w of FILTER_RULES.spam)
    if (lower.includes(w)) return { ok: false, severity: "warn", category: "Spam / Promocija",
      reason: "Tekst izgleda kao promocija ili spam.", suggestion: "Podeli iskustvo sa AI alatom umesto spoljnih linkova." };
  if (text.trim().length < 10) return { ok: false, severity: "warn", category: "Prekratko",
    reason: "Komentar je prekratak.", suggestion: "Dodaj malo više detalja.", };
  return { ok: true, reason: "", category: "", suggestion: "", severity: "ok" };
}

// -- POST COMPOSER ----------------------------------------------------------
function PostComposer({ onPost, onClose, onStrike, strikes }) {
  const [text, setText] = useState("");
  const [submitted, setSubmitted] = useState(false);
  const [justStruck, setJustStruck] = useState(false);
  const result = filterPost(text);
  const charLimit = 400;
  const hasText = text.trim().length >= 10;
  const strikesLeft = 3 - strikes;

  function handleSubmitAttempt() {
    // Attempt to submit with blocked content — issue a strike
    if (!result.ok && result.severity === "block") {
      onStrike({ category: result.category, text: text.slice(0, 60) + (text.length > 60 ? "..." : "") });
      setJustStruck(true);
      setText("");
      setTimeout(() => setJustStruck(false), 3000);
      return;
    }
    if (!result.ok || !hasText) return;
    setSubmitted(true);
    setTimeout(() => { onPost(text); onClose(); }, 1200);
  }

  if (submitted) return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", zIndex: 500, display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 12 }}>
      <div style={{ fontSize: "3rem", animation: "bounceIn 0.5s" }}>✅</div>
      <div style={{ fontFamily: F.display, fontSize: "1.5rem", color: T.green }}>OBJAVLJENO!</div>
    </div>
  );

  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.82)", zIndex: 400, display: "flex", alignItems: "flex-end" }}>
      <div onClick={e => e.stopPropagation()} style={{ width: "100%", background: T.bg2, borderRadius: "20px 20px 0 0", padding: "20px 18px 36px" }}>
        <div style={{ width: 36, height: 4, background: T.muted + "44", borderRadius: 2, margin: "0 auto 16px" }} />

        {/* Header with strike counter */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <div style={{ fontFamily: F.display, fontSize: "1.4rem", color: T.white }}>NOVI POST</div>
          {strikes > 0 && (
            <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
              {[0,1,2].map(i => (
                <div key={i} style={{ width: 10, height: 10, borderRadius: "50%", background: i < strikes ? T.red : T.muted + "33", border: `1px solid ${i < strikes ? T.red : T.muted + "55"}`, transition: "all 0.3s" }} />
              ))}
              <span style={{ fontFamily: F.mono, fontSize: "0.56rem", color: T.muted, marginLeft: 4 }}>{strikesLeft} preostalo</span>
            </div>
          )}
        </div>

        {/* Strike warning flash */}
        {justStruck && (
          <div style={{ background: "rgba(255,107,107,0.12)", border: `1px solid ${T.red}55`, borderRadius: 12, padding: "12px 14px", marginBottom: 12, animation: "fadeSlideIn 0.2s ease" }}>
            <div style={{ fontWeight: 700, fontSize: "0.85rem", color: T.red, marginBottom: 4 }}>
              ⚠️ Upozorenje {strikes}/3 — Prekršaj zabeležen
            </div>
            <div style={{ fontSize: "0.78rem", color: "#cc8888", lineHeight: 1.5 }}>
              {strikesLeft > 0
                ? `Još ${strikesLeft} prekršaj${strikesLeft === 1 ? "" : "a"} i komentarisanje će biti blokirano na 7 dana.`
                : "Ovo je bio poslednji prekršaj. Komentarisanje je blokirano na 7 dana."}
            </div>
          </div>
        )}

        <textarea
          value={text}
          onChange={e => setText(e.target.value.slice(0, charLimit))}
          placeholder="Podeli AI trik, uspeh ili pitanje sa zajednicom..."
          style={{
            width: "100%", minHeight: 110, background: T.bg3,
            border: `1px solid ${text.length > 0 && !result.ok ? T.red + "66" : "rgba(255,255,255,0.08)"}`,
            borderRadius: 14, padding: "14px", color: T.white,
            fontFamily: F.body, fontSize: "0.9rem", lineHeight: 1.6,
            resize: "none", outline: "none", transition: "border 0.2s",
          }}
          autoFocus
        />

        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 6, marginBottom: 12 }}>
          <div style={{ fontFamily: F.mono, fontSize: "0.58rem", color: T.muted }}>{charLimit - text.length} znakova</div>
          <div style={{ display: "flex", gap: 6 }}>
            {["Trik 💡", "Uspeh 🏆", "Pitanje ❓"].map(tag => (
              <button key={tag} onClick={() => setText(t => t + tag.split(" ")[0] + ": ")} style={{ ...btn(), background: T.card, color: T.muted, padding: "4px 10px", borderRadius: 50, fontSize: "0.62rem", fontFamily: F.mono }}>
                {tag}
              </button>
            ))}
          </div>
        </div>

        {/* Live filter feedback */}
        {text.length > 5 && !result.ok && !justStruck && (
          <div style={{ background: "rgba(255,107,107,0.08)", border: `1px solid ${T.red}44`, borderRadius: 12, padding: "12px 14px", marginBottom: 12, animation: "fadeSlideIn 0.25s ease" }}>
            <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 6 }}>
              <span>🚫</span>
              <span style={{ fontFamily: F.mono, fontSize: "0.6rem", color: T.red, letterSpacing: 1, textTransform: "uppercase" }}>{result.category}</span>
              {result.severity === "block" && <span style={{ fontFamily: F.mono, fontSize: "0.55rem", color: T.red, marginLeft: "auto" }}>→ STRIKE ako pokušaš da objaviš</span>}
            </div>
            <div style={{ fontSize: "0.8rem", color: "#cc8888", lineHeight: 1.5, marginBottom: 6 }}>{result.reason}</div>
            <div style={{ fontSize: "0.78rem", color: T.green, lineHeight: 1.5 }}>💡 {result.suggestion}</div>
          </div>
        )}

        {text.length >= 10 && result.ok && (
          <div style={{ background: "rgba(46,207,122,0.07)", border: `1px solid ${T.green}33`, borderRadius: 12, padding: "10px 14px", marginBottom: 12, display: "flex", gap: 8, alignItems: "center", animation: "fadeSlideIn 0.25s ease" }}>
            <span>✅</span>
            <span style={{ fontSize: "0.8rem", color: T.green }}>Post je spreman za objavljivanje!</span>
          </div>
        )}

        <div style={{ fontFamily: F.mono, fontSize: "0.58rem", color: T.muted, lineHeight: 1.8, marginBottom: 14 }}>
          📋 Bez promocije · Bez negativnih komentara · Bez uvredljivog sadržaja
        </div>

        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={onClose} style={{ ...btn(), flex: 1, background: T.card, color: T.muted, padding: 14, borderRadius: 14, fontSize: "0.85rem", fontFamily: F.body }}>
            Otkaži
          </button>
          <button
            onClick={handleSubmitAttempt}
            style={{ ...btn(), flex: 2, padding: 14, borderRadius: 14, fontSize: "0.88rem", fontFamily: F.body, transition: "all 0.2s",
              background: !hasText ? T.muted + "22" : result.ok ? T.gold : `${T.red}cc`,
              color: !hasText ? T.muted : result.ok ? "#000" : "#fff",
            }}
          >
            {!hasText ? "Napiši nešto..." : result.ok ? "Objavi →" : "Pokušaj da objaviš →"}
          </button>
        </div>
      </div>
    </div>
  );
}

function ZajednicaScreen({ setTab, streak, savedTips }) {
  const [feedTab, setFeedTab] = useState("feed");
  const [liked, setLiked] = useState([]);
  const [shareModal, setShareModal] = useState(false);

  const [composerOpen, setComposerOpen] = useState(false);
  const [bannedScreenOpen, setBannedScreenOpen] = useState(false);
  const [userPosts, setUserPosts] = useState([]);
  const [strikes, setStrikes] = useState(0);
  const [violations, setViolations] = useState([]);
  const isBanned = strikes >= 3;

  function handleStrike(violation) {
    const newStrikes = strikes + 1;
    const newViolations = [...violations, violation];
    setStrikes(newStrikes);
    setViolations(newViolations);
    if (newStrikes >= 3) {
      setComposerOpen(false);
      setTimeout(() => setBannedScreenOpen(true), 300);
    }
  }

  function handleOpenComposer() {
    if (isBanned) { setBannedScreenOpen(true); return; }
    setComposerOpen(true);
  }

  function handleNewPost(text) {
    setUserPosts(p => [{
      id: Date.now(), name: "Ti", avatar: "T", color: T.gold,
      time: "upravo", course: "AI Počet.", likes: 0, text,
    }, ...p]);
  }

  const allPosts = [...userPosts, ...COMMUNITY_POSTS];

  return (
    <div style={{ paddingBottom: 90 }}>
      {bannedScreenOpen && <BannedScreen violations={violations} onClose={() => setBannedScreenOpen(false)} />}
      {composerOpen && !isBanned && <PostComposer onPost={handleNewPost} onClose={() => setComposerOpen(false)} onStrike={handleStrike} strikes={strikes} />}

        <p style={{ color: T.muted, fontSize: "0.82rem", marginBottom: 16, lineHeight: 1.5 }}>
          Deli trikove, pitaj šta hoćeš, uči od drugih studenata.
        </p>

        {/* My stats quick row */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 16 }}>
          {[
            [streak >= 7 ? "🔥" : "⚡", `${streak} dana`, "Tvoj niz"],
            ["💾", `${savedTips}`, "Sačuvano"],
          ].map(([ic, val, lbl]) => (

// -- CONFETTI --------------------------------------------------------------
function Confetti() {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    const colors = [T.gold, T.green, T.blue, T.purple, "#ff6fdf", "#ff6b6b", "#fff"];
    const particles = Array.from({ length: 120 }, () => ({
      x: Math.random() * canvas.width,
      y: -20 - Math.random() * 200,
      r: 3 + Math.random() * 6,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() - 0.5) * 3,
      vy: 2 + Math.random() * 4,
      spin: Math.random() * 0.3,
      angle: Math.random() * Math.PI * 2,
      shape: Math.random() > 0.5 ? "rect" : "circle",
    }));
    let alive = true;
    function draw() {
      if (!alive) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.y += p.vy; p.x += p.vx; p.angle += p.spin; p.vy += 0.08;
        ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.angle);
        ctx.fillStyle = p.color; ctx.globalAlpha = Math.max(0, 1 - p.y / canvas.height);
        if (p.shape === "rect") { ctx.fillRect(-p.r, -p.r * 0.4, p.r * 2, p.r * 0.8); }
        else { ctx.beginPath(); ctx.arc(0, 0, p.r * 0.6, 0, Math.PI * 2); ctx.fill(); }
        ctx.restore();
      });
      requestAnimationFrame(draw);
    }
    draw();
    return () => { alive = false; };
  }, []);
  return <canvas ref={canvasRef} style={{ position: "fixed", inset: 0, width: "100%", height: "100%", pointerEvents: "none", zIndex: 999 }} />;
}

function recommendCourse(answers) {
  const aiLevel = answers[0]; // 0=nikad, 1=malo, 2=osnove, 3=napredno
  const goal    = answers[1]; // 3=zarada
  if (aiLevel >= 2 && goal === 3) return 3; // Ekspert
  if (aiLevel >= 1) return 2;               // Napredni
  return 1;                                 // Početnik
}

function OnboardingQuiz({ onDone }) {
  const [phase, setPhase]     = useState("welcome"); // welcome | quiz | result
  const [step, setStep]       = useState(0);
  const [answers, setAnswers] = useState([]);
  const [selected, setSelected] = useState(null);

  const recommended = recommendCourse(answers);
  const recCourse   = COURSES.find(c => c.id === recommended) || COURSES[0];
  const q           = ONBOARDING_Qs[step];

  function choose(i) {
    setSelected(i);
    setTimeout(() => {
      const next = [...answers, i];
      setAnswers(next);
      setSelected(null);
      if (step < ONBOARDING_Qs.length - 1) {
        setStep(s => s + 1);
      } else {
        setPhase("result");
      }
    }, 300);
  }

  // ── WELCOME ────────────────────────────────────────────────────────────
  if (phase === "welcome") return (
    <div style={{ minHeight: "100vh", background: T.bg, display: "flex", flexDirection: "column", padding: "0 0 40px" }}>
      {/* Big hero area */}
      <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "60px 28px 0", textAlign: "center" }}>

          <strong style={{ color: T.white }}>Samo rezultati — od prvog dana.</strong>
        </p>

        {/* 3 vrednosti */}
        <div style={{ width: "100%", maxWidth: 340, display: "flex", flexDirection: "column", gap: 10, marginBottom: 36 }}>
          {[
            ["⚡", "Nauči za vikend", "Lekcije po 10–20 min, gde god hoćeš"],

            <div key={title} style={{ background: T.card, borderRadius: 14, padding: "14px 16px", display: "flex", gap: 14, alignItems: "center", textAlign: "left", border: "1px solid rgba(255,255,255,0.04)" }}>

              </div>
            </div>
          ))}
        </div>
      </div>

      {/* CTA */}
      <div style={{ padding: "0 24px" }}>
        <button
          onClick={() => setPhase("quiz")}
          style={{ ...btn(), background: T.gold, color: "#000", padding: "17px", borderRadius: 16, fontSize: "1rem", width: "100%", fontFamily: F.body }}

        </button>
        <p style={{ textAlign: "center", color: T.muted, fontSize: "0.72rem", marginTop: 12, lineHeight: 1.5 }}>
          2 kratka pitanja · Bez registracije · Bez obaveza
        </p>
      </div>
    </div>
  );

  // ── RESULT ────────────────────────────────────────────────────────────
  if (phase === "result") return (
    <div style={{ minHeight: "100vh", background: T.bg, display: "flex", flexDirection: "column", padding: "60px 24px 40px" }}>
      <div style={{ textAlign: "center", marginBottom: 24 }}>
        <div style={{ fontSize: "3rem", marginBottom: 10, animation: "bounceIn 0.5s" }}>🎯</div>

        <p style={{ color: T.muted, fontSize: "0.88rem", lineHeight: 1.6, maxWidth: 320, margin: "0 auto" }}>
          {recCourse.tagline}

      </div>

      <div style={{ background: T.card, borderRadius: 18, padding: "20px", marginBottom: 20, border: `1px solid ${recCourse.color}33` }}>
        <div style={{ fontFamily: F.mono, fontSize: "0.58rem", color: T.muted, letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 12 }}>
          Šta ćeš naučiti

        {recCourse.whatYouGet.map((w, i) => (

            <span style={{ color: "#9ca3af", fontSize: "0.84rem", lineHeight: 1.5 }}>{w}</span>
          </div>
        ))}
      </div>

      <div style={{ background: `${recCourse.color}12`, border: `1px solid ${recCourse.color}33`, borderRadius: 14, padding: "14px 16px", marginBottom: 24, display: "flex", gap: 10, alignItems: "center" }}>

      >
        Pogledaj sve kurseve
      </button>

  // ── PITANJA ────────────────────────────────────────────────────────────
  const progress = ((step) / ONBOARDING_Qs.length) * 100;
  return (
    <div style={{ minHeight: "100vh", background: T.bg, display: "flex", flexDirection: "column", padding: "52px 24px 40px" }}>
      {/* Progress */}
      <div style={{ marginBottom: 36 }}>
        <div style={{ display: "flex", justifyContent: "space-between", fontFamily: F.mono, fontSize: "0.58rem", color: T.muted, marginBottom: 10 }}>
          <span>Pitanje {step + 1} od {ONBOARDING_Qs.length}</span>
          <button onClick={() => setPhase("welcome")} style={{ ...btn(), background: "none", color: T.muted, fontSize: "0.7rem", fontFamily: F.mono }}>← Nazad</button>

      {/* Question */}

          <div style={{ fontSize: "2.8rem", marginBottom: 14 }}>{q.icon}</div>

        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {q.options.map((opt, i) => (
            <button
              key={i}
              onClick={() => choose(i)}
              style={{
                ...btn(),
                background: selected === i ? `${T.gold}20` : T.card,

                borderRadius: 14, padding: "16px 18px",
                textAlign: "left", color: selected === i ? T.gold : T.white,
                fontSize: "0.9rem", display: "flex", alignItems: "center", gap: 14,

              <span style={{ fontSize: "1.4rem", flexShrink: 0 }}>{opt.icon}</span>
              <span style={{ fontWeight: selected === i ? 700 : 500 }}>{opt.label}</span>
              {selected === i && <span style={{ marginLeft: "auto", color: T.gold }}>✓</span>}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("home");
  const [course, setCourse] = useState(COURSES[0]);
  const [user, setUser] = useState(null);
  const [showGift, setShowGift] = useState(false);
  const [showQuiz, setShowQuiz] = useState(false);
  const [giftCourse, setGiftCourse] = useState(null);
  const [onboardingDone, setOnboardingDone] = useState(false);
  const [purchasedCourses, setPurchasedCourses] = useState([]); // prati kupovine

  // -- Engagement state ----------------------------
  const [streak, setStreak] = useState(1);
  const [savedTips, setSavedTips] = useState(0);
  const [hasNotif, setHasNotif] = useState(true);

  function handleSaveTip() {
    setSavedTips(s => s + 1);
    setStreak(s => Math.min(s + 1, 30));
  }

  function handlePurchase(c) {
    setPurchasedCourses(prev => prev.find(x => x.id === c.id) ? prev : [...prev, c]);
  }

  function triggerQuiz(c) {
    setGiftCourse(c);
    setShowQuiz(true);
    setShowGift(false);
  }

  function triggerGift(c) {
    setGiftCourse(c);
    setShowGift(true);
    setShowQuiz(false);
  }

  function handleOnboardingDone(courseId) {
    setOnboardingDone(true);
    if (courseId > 0) {
      const c = COURSES.find(x => x.id === courseId) || COURSES[0];
      setCourse(c);
      setTab("courses"); // Idi na courses da vidi trust signale pre kupovine
    } else {
      setTab("courses");
    }
  }

  function handleQuizPass() {
    setShowQuiz(false);
    setShowGift(true);
  }

  function handleQuizFail() {
    setShowQuiz(false);
    setShowGift(false);
    setTab("learn");
  }

  function handleTabChange(t) {
    setTab(t);
    if (t === "zajednica") setHasNotif(false);
  }

  const CSS = `
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0b0f; }
    button { -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { display: none; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.85)} }
    @keyframes bounceIn { 0%{transform:scale(0.3);opacity:0} 60%{transform:scale(1.15)} 100%{transform:scale(1);opacity:1} }
    @keyframes fadeSlideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes slideDown { from{opacity:0;transform:translateX(-50%) translateY(-16px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
    input::placeholder { color: #3a4055; }
  `;

  if (!onboardingDone) return (
    <div style={{ background: T.bg, color: T.white, minHeight: "100vh", fontFamily: F.body, maxWidth: 480, margin: "0 auto" }}>
      <style>{CSS}</style>
      <OnboardingQuiz onDone={handleOnboardingDone} />
    </div>
  );

  if (showQuiz) return (
    <div style={{ background: T.bg, color: T.white, minHeight: "100vh", fontFamily: F.body, maxWidth: 480, margin: "0 auto" }}>
      <style>{CSS}</style>
      <QuizScreen course={giftCourse || course} onPass={handleQuizPass} onFail={handleQuizFail} />
    </div>
  );

  if (showGift) return (
    <div style={{ background: T.bg, color: T.white, minHeight: "100vh", fontFamily: F.body, maxWidth: 480, margin: "0 auto" }}>
      <style>{CSS}</style>
      <GiftScreen course={giftCourse || course} user={user} onDone={() => { setShowGift(false); setTab("home"); }} />
    </div>
  );

  return (
    <div style={{ background: T.bg, color: T.white, minHeight: "100vh", fontFamily: F.body, overflowX: "hidden", maxWidth: 480, margin: "0 auto", position: "relative" }}>
      <style>{CSS}</style>

      {tab === "home"      && <HomeScreen setTab={handleTabChange} setCourse={setCourse} user={user} triggerQuiz={triggerQuiz} streak={streak} savedTips={savedTips} onSaveTip={handleSaveTip} />}
      {tab === "courses"   && <CoursesScreen setCourse={setCourse} setTab={handleTabChange} />}
      {tab === "learn"     && <LearnScreen course={course} setCourse={setCourse} setTab={handleTabChange} user={user} triggerQuiz={triggerQuiz} purchasedCourses={purchasedCourses} onPurchase={handlePurchase} />}
      {tab === "zajednica" && <ZajednicaScreen setTab={handleTabChange} streak={streak} savedTips={savedTips} />}
      {tab === "profile"   && <ProfileScreen user={user} setUser={setUser} setTab={handleTabChange} purchasedCourses={purchasedCourses} />}

      <BottomNav tab={tab} setTab={handleTabChange} hasNotif={hasNotif} />
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
